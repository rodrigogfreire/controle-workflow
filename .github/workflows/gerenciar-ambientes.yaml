name: Workflow Ambientes
on: 
    workflow_dispatch: 

jobs:
    deploy-fake-homologacao:
        runs-on: ubuntu-latest
        environment: 
            name: Homologacao
            url: "https://homologacao.exemplo.com"
        steps:
            - name: Fake de deploy em ambiente
              run: echo "Deploy no ambiente de ${{ vars.AMBIENTE_DEPLOY }}"

    teste-fake-homologacao:
        needs: deploy-fake-homologacao
        runs-on: ubuntu-latest
        environment: 
            name: Homologacao
            url: "https://homologacao.exemplo.com"
        steps:
            - name: Fake de Teste em ambiente
              run: echo "Teste no ambiente de ${{ vars.AMBIENTE_DEPLOY }}"

    deploy-fake-producao:
        needs: teste-fake-homologacao
        runs-on: ubuntu-latest
        environment: 
            name: Producao
            url: "https://producao.exemplo.com"
        steps:
            - name: Fake de Teste em ambiente
              run: echo "Teste no ambiente de ${{ vars.AMBIENTE_DEPLOY }}"
